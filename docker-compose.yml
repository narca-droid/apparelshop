version: '3.8'

services:
  apparelshop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apparelshop
    restart: unless-stopped
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - ./data:/app/data
      - ./https:/https:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/apparelshop.db
      - Email__SmtpHost=${SMTP_HOST:-}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__SmtpUser=${SMTP_USER:-}
      - Email__SmtpPass=${SMTP_PASS:-}
      - Email__FromAddress=${FROM_ADDRESS:-noreply@apparelshop.com}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
